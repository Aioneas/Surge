<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1600 520" fill="none" role="img" aria-labelledby="title desc">
  <title id="title">Surge by Aioneas</title>
  <desc id="desc">Claude-inspired minimal banner for a Surge repository.</desc>
  <defs>
