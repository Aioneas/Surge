  <text x="120" y="300" fill="#4D3E33" font-size="22" font-weight="400" font-family="SF Pro Text, Inter, ui-sans-serif, system-ui, -apple-system, Segoe UI, Roboto, Helvetica, Arial, sans-serif">A curated Surge / Sugar setup for iPhone, focused on stability, readable structure,</text>
  <text x="120" y="334" fill="#4D3E33" font-size="22" font-weight="400" font-family="SF Pro Text, Inter, ui-sans-serif, system-ui, -apple-system, Segoe UI, Roboto, Helvetica, Arial, sans-serif">modular rewrites, and long-term maintenance without external fragility.</text>

