      <stop stop-color="#F7F1E8"/>
      <stop offset="0.56" stop-color="#F1E6D8"/>
      <stop offset="1" stop-color="#E7D6C4"/>
    </linearGradient>
    <radialGradient id="glow" cx="0" cy="0" r="1" gradientUnits="userSpaceOnUse" gradientTransform="translate(1248 172) rotate(90) scale(220 300)">
