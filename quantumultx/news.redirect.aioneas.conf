#!name=新闻网站智能重定向@Aioneas
#!desc=财新 / FT中文 / FT / WSJ / Bloomberg / Economist / NYT / 端传媒 自动 302 跳转镜像阅读页（Quantumult X 版）
#!author=caixinshop + Aioneas
#!homepage=https://github.com/Aioneas/Surge/tree/news-redirect-loon-qx
#!icon=https://raw.githubusercontent.com/Aioneas/Surge/news-redirect-loon-qx/Icon/Global.png

# 财新：如 /2026-04-03/102431052.html
^https?:\/\/(?!(?:deepview|datanews)\.)[^\/]*caixin\.com\/.*?\/(\d{9})\.html(?:\?.*)?$ url 302 https://best.viatl.de/cx/$1

# FT 中文网：兼容 www / 裸域 / m 子域文章页与 interactive 页面
^https?:\/\/(?:(?:www|m)\.)?ftchinese\.com\/(?:story|interactive)\/(\d+)(?:\?.*)?$ url 302 https://best.viatl.de/ft/$1

# FT 英文版：如 /content/<uuid>
^https?:\/\/www\.ft\.com\/content\/([0-9a-fA-F-]+)(?:\?.*)?$ url 302 https://best.viatl.de/fte/$1

# WSJ：文章 slug 末尾带 8 位十六进制 ID
^(https?:\/\/(?:(?:www|cn)\.)?wsj\.com\/(?:[^\/?#]+\/)*[^\/?#]*-[A-Fa-f0-9]{8}(?:\?[^#]*)?)$ url 302 https://best.viatl.de/wsj/$1

# Bloomberg：articles / features / newsletters
^(https?:\/\/www\.bloomberg\.com\/(?:[^?#]+\/)?(?:articles|features|newsletters)\/[^?#]+(?:\?[^#]*)?)$ url 302 https://best.viatl.de/bb/$1

# Economist：文章路径中包含 YYYY/MM/DD
^(https?:\/\/www\.economist\.com\/[^?#]*\/\d{4}\/\d{2}\/\d{2}\/[^?#]+(?:\?[^#]*)?)$ url 302 https://best.viatl.de/te/$1

# NYT：仅收敛到常见日期型文章页，避免误伤站内资源请求
^(https?:\/\/www\.nytimes\.com\/\d{4}\/\d{2}\/\d{2}\/[^?#]+(?:\.html)?(?:\?[^#]*)?)$ url 302 https://best.viatl.de/nyt/$1

# 端传媒：路径以 /YYYYMMDD- 开头
^(https?:\/\/(?:theinitium\.com|[^\/]+\.theinitium\.com)\/\d{8}-[^?#]+(?:\?[^#]*)?)$ url 302 https://best.viatl.de/duan/$1

hostname = *.caixin.com, ftchinese.com, *.ftchinese.com, www.ft.com, cn.wsj.com, www.wsj.com, www.bloomberg.com, www.economist.com, www.nytimes.com, theinitium.com, *.theinitium.com
